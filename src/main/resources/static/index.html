<html>
<head>
    <link href="digitalbrynjar.css" rel="stylesheet"/>
    <script>
        function searchKeyDown(ele) {
            if(event.key === 'Enter') {
                search(ele.value)
            }
        }
        function search(value) {
            var encodedUrl = encodeURI("search?keywords=" + value);
            var html = ""
            $.ajax({
                url: encodedUrl,
                cache: false,
                success: function(result){
                    var list = result.results;
                    if (list.length == 0)
                        html = "<p>There were no results for <b>" + value + "</b></p><br/>";
                    else {
                        for (let i = 0; i < list.length; i++) {
                            var href = null;
                            var title = null;
                            if (list[i].source.startsWith('http')) {
                                href = list[i].source;
                                title = list[i].name;
                            }
                            else {
                                href = "localFile?filePath=" + list[i].source;
                                href = href.replaceAll("\\", "/");
                                href = encodeURI(href);
                                title = list[i].name;
                                title = title.replaceAll("\\", "/");
                                //title = encodeURI(title);
                            }
                            html += "<a target='_blank' rel='noopener noreferrer' href='" + href + "'>" + title + "</a><br/>"
                        }
                    }
                    $("#results").html(html);
                }
            });
        }
    </script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<div id="search">
    <svg viewBox="0 0 420 60" xmlns="http://www.w3.org/2000/svg">
        <rect class="bar"/>

        <g class="magnifier">
            <circle class="glass"/>
            <line class="handle" x1="32" y1="32" x2="44" y2="44"></line>
        </g>
